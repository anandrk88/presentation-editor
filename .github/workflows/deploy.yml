# Build, test, and deploy the editor on every push to main.
#
# Out of the box this deploys to GitHub Pages (zero config — just enable
# Pages → Source: GitHub Actions in the repo settings). For production,
# switch to the Cloudflare Pages or S3/R2 job below by adding the secrets
# and flipping the `if:` flags.

name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Engine round-trip suite
        run: npm run smoke
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist }
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with: { path: dist }

  # ---- default: GitHub Pages (good for testing; URL: https://<user>.github.io/<repo>/) ----
  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ---- production option 1: Cloudflare Pages ----
  # Set repo secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID and change `if` to true.
  deploy-cloudflare:
    if: ${{ false }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=presentation-editor

  # ---- production option 2: S3 (+ optional CloudFront invalidation) ----
  # Set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION / S3_BUCKET
  # (+ CLOUDFRONT_DIST_ID) and change `if` to true.
  deploy-s3:
    if: ${{ false }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sync (hashed assets immutable, entry points no-cache)
        run: |
          aws s3 sync dist "s3://$S3_BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html --exclude version.json --exclude embed-test.html
          aws s3 cp dist/index.html "s3://$S3_BUCKET/index.html" --cache-control "no-cache"
          aws s3 cp dist/version.json "s3://$S3_BUCKET/version.json" --cache-control "no-cache"
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
      - name: Invalidate CloudFront
        if: ${{ secrets.CLOUDFRONT_DIST_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DIST_ID }}" --paths "/index.html" "/version.json"
